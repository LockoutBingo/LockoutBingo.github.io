<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals - Lockout Bingo</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="scripts/menu.js" defer></script>
</head>
<body>
    <header>
        <div class="nav-menu-container">
            <a class="nav-button nav-menu" id="menu-button">
                <img src="assets/images/menu_button_shadow.png" class="button-shadow" alt="" aria-hidden="true">
                <img src="assets/images/menu_button.png" class="button-image" alt="Menu">
            </a>
            <div class="nav-menu-dropdown" id="menu-dropdown">
                <a href="gameplay.html">Gameplay</a>
                <a href="goals.html">Goals</a>
                <a href="download.html">Download</a>
                <a href="about.html">About</a>
            </div>
        </div>
        <div class="header-content">
            <nav class="nav-left">
                <a class="nav-button" href="gameplay.html">
                    <img src="assets/images/gameplay_button_shadow.png" class="button-shadow" alt="" aria-hidden="true">
                    <img src="assets/images/gameplay_button.png" class="button-image" alt="Gameplay">
                </a>
                <a class="nav-button" href="goals.html">
                    <img src="assets/images/goals_button_shadow.png" class="button-shadow" alt="" aria-hidden="true">
                    <img src="assets/images/goals_button.png" class="button-image" alt="Goals">
                </a>
            </nav>
            <nav>
                <a class="nav-title" href="index.html">
                    <img src="assets/images/title.svg" alt="Lockout Bingo">
                </a>
            </nav>
            <nav class="nav-right">
                <a class="nav-button" href="download.html">
                    <img src="assets/images/download_button_shadow.png" class="button-shadow" alt="" aria-hidden="true">
                    <img src="assets/images/download_button.png" class="button-image" alt="Download">
                </a>
                <a class="nav-button" href="about.html">
                    <img src="assets/images/about_button_shadow.png" class="button-shadow" alt="" aria-hidden="true">
                    <img src="assets/images/about_button.png" class="button-image" alt="About">
                </a>
            </nav>
        </div>
    </header>

    <main>
        <div class="main-content">
            <div class="goals-page">
                <aside class="goals-sidebar">
                    <div class="goal-search">
                        <input type="text" id="goal-search" placeholder="Search goals...">
                    </div>

                    <div class="goal-counts">
                        <div>
                            Total Goals:
                            <span id="total-count">0</span>
                        </div>

                        <div>
                            Showing:
                            <span id="filtered-count">0</span>
                        </div>
                    </div>

                    <section class="goal-filter">
                        <h3>Difficulty</h3>

                        <div class="difficulty-range">
                            <input type="range" id="difficulty-min" min="0" max="25" value="0">
                            <input type="range" id="difficulty-max" min="0" max="25" value="25">
                        </div>

                        <div>
                            <span id="difficulty-label">
                                0 - 25
                            </span>
                        </div>
                    </section>

                    <section class="goal-filter">
                        <h3>Categories</h3>
                        <div id="category-filter"></div>
                    </section>


                    <section class="goal-filter">
                        <h3>Tags</h3>
                        <div id="tag-filter"></div>
                    </section>
                </aside>

                <section class="goals-content">
                    <div class="goals-toolbar">
                        <div>
                            <span id="goal-result-count">
                                0
                            </span>
                            Goals
                        </div>

                        <select id="sort-select">
                            <option value="name">
                                Alphabetical
                            </option>

                            <option value="difficulty-asc">
                                Difficulty ↑
                            </option>

                            <option value="difficulty-desc">
                                Difficulty ↓
                            </option>
                        </select>

                        <div class="view-buttons">
                            <button data-view="list">
                                List
                            </button>

                            <button data-view="grid3">
                                Grid 3
                            </button>

                            <button data-view="grid5">
                                Grid 5
                            </button>
                        </div>
                    </div>

                    <div id="goal-list" class="goal-grid3">
                    </div>
                </section>
            </div>
            
            <script src="scripts/goals.js" defer></script>
        </div>
    </main>
</body>
</html>
